name: Claude Review Responder

on:
  pull_request_review:
    types: [submitted]

jobs:
  respond-to-copilot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
      issues: write
      contents: write

    steps:
      - name: Collect and classify Copilot comments
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            // Copilot 리뷰가 아닌 경우 스킵 (job-level if 대신 early return으로 action_required 방지)
            const reviewerLogin = context.payload.review?.user?.login ?? '';
            if (!reviewerLogin.includes('copilot-pull-request-reviewer')) {
              core.notice(`리뷰어 ${reviewerLogin} — Copilot 아님, 건너뜀`);
              core.setOutput('has_work', 'false');
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'check-copilot-review',
                description,
              });
            };

            const allComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber }
            );

            const reviewId = context.payload.review.id;
            const copilotTopComments = allComments.filter(c =>
              c.pull_request_review_id === reviewId && !c.in_reply_to_id
            );

            const repliedIds = new Set(
              allComments.filter(c => c.in_reply_to_id).map(c => c.in_reply_to_id)
            );

            const unreplied = copilotTopComments.filter(c => !repliedIds.has(c.id));

            if (unreplied.length === 0) {
              core.notice('처리할 미답변 코멘트 없음');
              await setStatus('success', `Copilot 리뷰 ${copilotTopComments.length}건 — 모두 처리됨`);
              core.setOutput('has_work', 'false');
              return;
            }

            const suggestions = [];
            const architectural = [];

            for (const comment of unreplied) {
              if (/```suggestion\r?\n[\s\S]*?\n```/.test(comment.body)) {
                suggestions.push(comment);
              } else {
                architectural.push(comment);
              }
            }

            const fs = require('fs');
            fs.writeFileSync('/tmp/suggestions.json', JSON.stringify(suggestions));
            fs.writeFileSync('/tmp/architectural.json', JSON.stringify(architectural));

            core.setOutput('has_work', 'true');
            core.setOutput('has_suggestions', (suggestions.length > 0).toString());
            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', sha);
            core.setOutput('pr_number', prNumber.toString());
            core.setOutput('total_count', copilotTopComments.length.toString());
            core.notice(`제안 블록: ${suggestions.length}건, 아키텍처 제안: ${architectural.length}건`);

      - name: Checkout PR branch
        if: steps.collect.outputs.has_suggestions == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COMMIT_PAT }}
          ref: ${{ steps.collect.outputs.branch }}
          fetch-depth: 0

      - name: Evaluate and apply code suggestions
        if: steps.collect.outputs.has_suggestions == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const suggestions = JSON.parse(fs.readFileSync('/tmp/suggestions.json', 'utf8'));
          const results = [];

          for (const comment of suggestions) {
            let fileContent = '';
            try {
              fileContent = fs.readFileSync(comment.path, 'utf8');
            } catch (e) {
              console.warn(`파일 읽기 실패: ${comment.path} — ${e.message}`);
            }

            // Anthropic API로 유효성 평가
            let evaluation = { valid: false, reason: '평가 실패' };
            try {
              const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-6',
                  max_tokens: 256,
                  messages: [{
                    role: 'user',
                    content: `다음 Copilot suggestion이 타당한지 판단하세요. JSON으로만 응답하세요.

파일: ${comment.path} (라인 ${comment.start_line ?? comment.line}–${comment.line})
diff_hunk:
${comment.diff_hunk}

Copilot suggestion:
${comment.body}

응답 형식 (JSON만, 다른 텍스트 없이): {"valid": true/false, "reason": "한국어 한 문장"}`,
                  }],
                }),
              });
              const data = await resp.json();
              const text = (data.content?.[0]?.text ?? '').trim();
              evaluation = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
            } catch (e) {
              console.error(`평가 API 오류: comment ${comment.id} — ${e.message}`);
              results.push({ comment_id: comment.id, action: 'eval_failed', explanation: `평가 중 오류 발생: ${e.message}` });
              continue;
            }

            if (!evaluation.valid) {
              console.log(`✗ 미적용: comment ${comment.id} — ${evaluation.reason}`);
              results.push({ comment_id: comment.id, action: 'declined', explanation: evaluation.reason });
              continue;
            }

            // 유효하면 파일 수정 (regex 기반 적용)
            try {
              const match = comment.body.match(/```suggestion\r?\n([\s\S]*?)\n```/);
              if (!match) throw new Error('suggestion 블록 파싱 실패');
              const suggestionLines = match[1].split('\n');
              const startLine = comment.start_line ?? comment.line;
              const endLine = comment.line;
              const lines = fileContent.split('\n');
              const newLines = [
                ...lines.slice(0, startLine - 1),
                ...suggestionLines,
                ...lines.slice(endLine),
              ];
              fs.writeFileSync(comment.path, newLines.join('\n'));
              console.log(`✓ 적용: comment ${comment.id} — ${comment.path}:${startLine}-${endLine}`);
              results.push({ comment_id: comment.id, action: 'applied', explanation: evaluation.reason });
            } catch (e) {
              console.error(`✗ 적용 실패: comment ${comment.id} — ${e.message}`);
              results.push({ comment_id: comment.id, action: 'apply_failed', explanation: e.message });
            }
          }

          fs.writeFileSync('/tmp/suggestion_results.json', JSON.stringify(results));
          console.log('suggestion 처리 결과:', JSON.stringify(results, null, 2));
          SCRIPT

      - name: Commit applied suggestions
        if: steps.collect.outputs.has_suggestions == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "변경사항 없음"
          else
            git add -A
            git commit -m "fix: apply Copilot code suggestions"
            git push
          fi

      - name: Process architectural comments and reply to all
        if: steps.collect.outputs.has_work == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.collect.outputs.pr_number }}
          SHA: ${{ steps.collect.outputs.sha }}
          TOTAL_COUNT: ${{ steps.collect.outputs.total_count }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.SHA;
            const totalCount = Number(process.env.TOTAL_COUNT);

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'check-copilot-review',
                description,
              });
            };

            const architectural = JSON.parse(fs.readFileSync('/tmp/architectural.json', 'utf8'));
            const suggestionResults = fs.existsSync('/tmp/suggestion_results.json')
              ? JSON.parse(fs.readFileSync('/tmp/suggestion_results.json', 'utf8'))
              : [];

            // 라벨 사전 보장
            const LABELS = [
              { name: 'copilot-suggestion', color: '0075ca', description: 'Copilot 리뷰에서 수용된 제안' },
              { name: 'architecture',       color: 'e4e669', description: '아키텍처 구조 변경 제안' },
              { name: 'refactor',           color: 'd4c5f9', description: '코드 정리 및 리팩토링 제안' },
              { name: 'tech-debt',          color: 'f29513', description: '기술 부채 해소 제안' },
              { name: 'performance',        color: '0e8a16', description: '성능 개선 제안' },
              { name: 'security',           color: 'ee0701', description: '보안 관련 제안' },
              { name: 'test',               color: '1d76db', description: '테스트 관련 제안' },
            ];
            for (const label of LABELS) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: label.name,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, ...label,
                });
              }
            }

            // Architectural 코멘트 평가 + 이슈 생성 또는 거절
            const archResults = [];
            const VALID_LABELS = ['architecture', 'refactor', 'tech-debt', 'performance', 'security', 'test'];

            for (const comment of architectural) {
              const lineRef = comment.line ?? comment.original_line ?? '?';
              let evaluation = { valid: false, label: 'refactor', reason: '평가 실패' };

              try {
                const resp = await fetch('https://api.anthropic.com/v1/messages', {
                  method: 'POST',
                  headers: {
                    'x-api-key': process.env.ANTHROPIC_API_KEY,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 256,
                    messages: [{
                      role: 'user',
                      content: `다음 Copilot 아키텍처/구조 제안을 평가하세요. JSON으로만 응답하세요.

파일: ${comment.path}:${lineRef}
diff_hunk:
${comment.diff_hunk}

Copilot 코멘트:
${comment.body}

응답 형식 (JSON만, 다른 텍스트 없이):
{
  "valid": true/false,
  "label": "architecture|refactor|tech-debt|performance|security|test",
  "reason": "한국어 한두 문장"
}`,
                    }],
                  }),
                });
                const data = await resp.json();
                const text = (data.content?.[0]?.text ?? '').trim();
                const parsed = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
                evaluation = {
                  valid: parsed.valid,
                  label: VALID_LABELS.includes(parsed.label) ? parsed.label : 'refactor',
                  reason: parsed.reason ?? '이유 없음',
                };
              } catch (e) {
                core.warning(`평가 API 오류: comment ${comment.id} — ${e.message}`);
                archResults.push({ comment_id: comment.id, action: 'eval_failed', explanation: `평가 중 오류: ${e.message}` });
                continue;
              }

              if (evaluation.valid) {
                try {
                  const issueBody = [
                    `## Copilot 제안`,
                    ``,
                    `- **PR:** #${prNumber}`,
                    `- **파일:** \`${comment.path}\`:${lineRef}`,
                    ``,
                    `### Copilot 코멘트`,
                    comment.body,
                    ``,
                    `### 코드 컨텍스트`,
                    '```diff',
                    comment.diff_hunk,
                    '```',
                  ].join('\n');

                  const { data: issue } = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: `[Copilot] ${comment.path}:${lineRef}`,
                    body: issueBody,
                    labels: ['copilot-suggestion', evaluation.label],
                  });

                  archResults.push({
                    comment_id: comment.id,
                    action: 'issued',
                    issue_number: issue.number,
                    explanation: evaluation.reason,
                  });
                  core.notice(`이슈 생성: #${issue.number} [${evaluation.label}] (${comment.path}:${lineRef})`);
                } catch (e) {
                  core.warning(`이슈 생성 실패: ${e.message}`);
                  archResults.push({ comment_id: comment.id, action: 'issue_failed', explanation: e.message });
                }
              } else {
                archResults.push({ comment_id: comment.id, action: 'declined', explanation: evaluation.reason });
                core.notice(`미적용: comment ${comment.id} — ${evaluation.reason}`);
              }
            }

            // 모든 코멘트에 답글
            let failedCount = 0;
            const allResults = [...suggestionResults, ...archResults];

            for (const r of allResults) {
              let body;
              switch (r.action) {
                case 'applied':
                  body = `적용했습니다.\n> ${r.explanation}`;
                  break;
                case 'declined':
                  body = `미적용 사유: ${r.explanation}`;
                  break;
                case 'apply_failed':
                  body = `⚠️ 자동 적용 실패 — 수동 검토가 필요합니다.\n> ${r.explanation}`;
                  failedCount++;
                  break;
                case 'issued':
                  body = `이슈로 등록했습니다: #${r.issue_number}\n> ${r.explanation}`;
                  break;
                case 'issue_failed':
                  body = `⚠️ 이슈 생성 실패 — 수동 처리가 필요합니다.\n> ${r.explanation}`;
                  failedCount++;
                  break;
                case 'eval_failed':
                  body = `⚠️ 평가 실패 — 수동 검토가 필요합니다.\n> ${r.explanation}`;
                  failedCount++;
                  break;
                default:
                  body = `처리됨: ${r.explanation ?? ''}`;
              }

              try {
                await github.rest.pulls.createReplyForReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  comment_id: r.comment_id,
                  body,
                });
                core.notice(`답글 완료: comment ${r.comment_id} (${r.action})`);
              } catch (e) {
                core.warning(`답글 실패: comment ${r.comment_id} — ${e.message}`);
                failedCount++;
              }
            }

            // Commit Status 업데이트
            const applied = allResults.filter(r => r.action === 'applied').length;
            const declined = allResults.filter(r => r.action === 'declined').length;
            const issued = allResults.filter(r => r.action === 'issued').length;

            if (failedCount === 0) {
              await setStatus('success', `${allResults.length}건 처리됨 (적용 ${applied}건, 거절 ${declined}건, 이슈 ${issued}건)`);
            } else {
              await setStatus('failure', `처리 실패 ${failedCount}건 — 수동 검토 필요`);
            }
