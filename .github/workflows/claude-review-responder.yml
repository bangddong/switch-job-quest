name: Claude Review Responder

on:
  pull_request_review:
    types: [submitted]

jobs:
  respond-to-copilot:
    if: contains(github.event.review.user.login, 'copilot-pull-request-reviewer')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
      issues: write
      contents: write

    steps:
      - name: Collect and classify Copilot comments
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'check-copilot-review',
                description,
              });
            };

            const allComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber }
            );

            const reviewId = context.payload.review.id;
            const copilotTopComments = allComments.filter(c =>
              c.pull_request_review_id === reviewId && !c.in_reply_to_id
            );

            const repliedIds = new Set(
              allComments.filter(c => c.in_reply_to_id).map(c => c.in_reply_to_id)
            );

            const unreplied = copilotTopComments.filter(c => !repliedIds.has(c.id));

            if (unreplied.length === 0) {
              core.notice('처리할 미답변 코멘트 없음');
              await setStatus('success', `Copilot 리뷰 ${copilotTopComments.length}건 — 모두 처리됨`);
              core.setOutput('has_work', 'false');
              return;
            }

            const suggestions = [];
            const architectural = [];

            for (const comment of unreplied) {
              if (/```suggestion\r?\n[\s\S]*?\n```/.test(comment.body)) {
                suggestions.push(comment);
              } else {
                architectural.push(comment);
              }
            }

            const fs = require('fs');
            fs.writeFileSync('/tmp/suggestions.json', JSON.stringify(suggestions));
            fs.writeFileSync('/tmp/architectural.json', JSON.stringify(architectural));

            core.setOutput('has_work', 'true');
            core.setOutput('has_suggestions', (suggestions.length > 0).toString());
            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', sha);
            core.setOutput('pr_number', prNumber.toString());
            core.setOutput('total_count', copilotTopComments.length.toString());
            core.notice(`제안 블록: ${suggestions.length}건, 아키텍처 제안: ${architectural.length}건`);

      - name: Checkout PR branch
        if: steps.collect.outputs.has_suggestions == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COMMIT_PAT }}
          ref: ${{ steps.collect.outputs.branch }}
          fetch-depth: 0

      - name: Apply code suggestions and commit
        if: steps.collect.outputs.has_suggestions == 'true'
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const suggestions = JSON.parse(fs.readFileSync('/tmp/suggestions.json', 'utf8'));
          const applied = [];
          const failed = [];

          for (const comment of suggestions) {
            try {
              const match = comment.body.match(/```suggestion\r?\n([\s\S]*?)\n```/);
              if (!match) {
                console.warn(`suggestion 블록 파싱 실패: comment ${comment.id}`);
                failed.push(comment.id);
                continue;
              }

              const suggestionLines = match[1].split('\n');
              const filePath = comment.path;
              const startLine = comment.start_line ?? comment.line;
              const endLine = comment.line;

              const content = fs.readFileSync(filePath, 'utf8');
              const lines = content.split('\n');

              const newLines = [
                ...lines.slice(0, startLine - 1),
                ...suggestionLines,
                ...lines.slice(endLine),
              ];

              fs.writeFileSync(filePath, newLines.join('\n'));
              applied.push(comment.id);
              console.log(`✓ ${filePath}:${startLine}-${endLine}`);
            } catch (e) {
              console.error(`✗ comment ${comment.id}: ${e.message}`);
              failed.push(comment.id);
            }
          }

          fs.writeFileSync('/tmp/applied.json', JSON.stringify(applied));
          fs.writeFileSync('/tmp/failed.json', JSON.stringify(failed));
          SCRIPT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "변경사항 없음"
            echo "[]" > /tmp/applied.json
          else
            git add -A
            git commit -m "fix: apply Copilot code suggestions"
            git push
          fi

      - name: Reply to comments and create issues
        if: steps.collect.outputs.has_work == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.collect.outputs.pr_number }}
          SHA: ${{ steps.collect.outputs.sha }}
          TOTAL_COUNT: ${{ steps.collect.outputs.total_count }}
        with:
          script: |
            const fs = require('fs');

            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.SHA;
            const totalCount = Number(process.env.TOTAL_COUNT);

            const suggestions = JSON.parse(fs.readFileSync('/tmp/suggestions.json', 'utf8'));
            const architectural = JSON.parse(fs.readFileSync('/tmp/architectural.json', 'utf8'));
            const applied = fs.existsSync('/tmp/applied.json')
              ? JSON.parse(fs.readFileSync('/tmp/applied.json', 'utf8'))
              : [];

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'check-copilot-review',
                description,
              });
            };

            // copilot-suggestion 라벨 보장
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: 'copilot-suggestion',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: 'copilot-suggestion', color: '0075ca',
                description: 'Copilot 리뷰에서 수용된 제안',
              });
            }

            let failedCount = 0;

            // suggestion 블록 처리 결과 답글
            for (const comment of suggestions) {
              const wasApplied = applied.includes(comment.id);
              const body = wasApplied
                ? '수정 완료했습니다.'
                : '⚠️ 자동 적용 실패 — 수동 검토가 필요합니다.';

              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNumber, comment_id: comment.id, body,
              });

              if (!wasApplied) failedCount++;
              core.notice(`답글 완료: comment ${comment.id} (${wasApplied ? '적용' : '실패'})`);
            }

            // 아키텍처 제안 → 이슈 생성 + 답글
            for (const comment of architectural) {
              const lineRef = comment.line ?? comment.original_line ?? '?';
              const issueTitle = `[Copilot] ${comment.path}:${lineRef}`;
              const issueBody = [
                `## Copilot 아키텍처 제안`,
                ``,
                `- **PR:** #${prNumber}`,
                `- **파일:** \`${comment.path}\`:${lineRef}`,
                ``,
                `### Copilot 코멘트`,
                comment.body,
                ``,
                `### 코드 컨텍스트`,
                '```diff',
                comment.diff_hunk,
                '```',
              ].join('\n');

              try {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: issueTitle, body: issueBody, labels: ['copilot-suggestion'],
                });

                await github.rest.pulls.createReplyForReviewComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  pull_number: prNumber, comment_id: comment.id,
                  body: `아키텍처 제안으로 이슈 등록했습니다: #${issue.number}`,
                });

                core.notice(`이슈 생성: #${issue.number} (${comment.path}:${lineRef})`);
              } catch (e) {
                core.warning(`이슈 생성 실패: ${e.message}`);
                failedCount++;
              }
            }

            // Commit Status 업데이트
            const processedCount = suggestions.length + architectural.length;
            if (failedCount === 0) {
              await setStatus('success', `Copilot 리뷰 ${totalCount}건 — 모두 처리됨`);
            } else {
              await setStatus('failure', `미처리 ${failedCount}건 남음`);
            }
