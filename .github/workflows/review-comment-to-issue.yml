name: Review Comment → Issue

on:
  pull_request_review_comment:
    types: [created]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create issue from review comment
        # /issue 키워드로 시작하는 리뷰 코멘트만 처리 (job 레벨 skip → action_required 방지)
        if: startsWith(github.event.comment.body, '/issue')
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const pr = context.payload.pull_request;

            // /issue 키워드 제거 후 내용 파싱
            const raw = comment.body.replace(/^\/issue\s*/i, '').trim();
            const lines = raw.split('\n');
            const title = lines[0].substring(0, 80) || `Fix: ${comment.path}`;
            const detail = lines.slice(1).join('\n').trim();

            const body = [
              detail,
              '',
              '---',
              `**출처:** PR #${pr.number} [${pr.title}](${pr.html_url})`,
              `**파일:** \`${comment.path}\` (line ${comment.line ?? comment.original_line ?? '?'})`,
              `**리뷰 코멘트:** ${comment.html_url}`,
              '',
              '@github-copilot 위 내용을 참고해서 수정해줘.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['from-review'],
            });

            core.summary.addRaw(`이슈 생성 완료: ${issue.data.html_url}`);
            await core.summary.write();
