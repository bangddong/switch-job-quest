name: Copilot Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write

    steps:
      - name: Check for unresolved Copilot review comments
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number
              ?? context.payload.review?.pull_request_url?.split('/').pop();

            // 1. Copilot이 리뷰를 달았는지 확인
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: Number(prNumber) }
            );

            const copilotReviews = reviews.filter(
              r => r.user.login === 'copilot-pull-request-reviewer[bot]'
            );

            if (copilotReviews.length === 0) {
              core.notice('Copilot 리뷰 없음 — 통과');
              return;
            }

            // 2. 미해결 인라인 코멘트 수집
            const allComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: Number(prNumber) }
            );

            const copilotReviewIds = new Set(copilotReviews.map(r => r.id));
            const unresolvedComments = allComments.filter(c =>
              copilotReviewIds.has(c.pull_request_review_id) && !c.in_reply_to_id
            );

            // 3. 판정
            if (unresolvedComments.length === 0) {
              core.notice(`Copilot 리뷰 ${copilotReviews.length}건 — 모두 처리됨. 통과`);
              return;
            }

            const summary = unresolvedComments
              .map(c => `- \`${c.path}:${c.line ?? c.original_line ?? '?'}\` — ${c.body.slice(0, 100)}`)
              .join('\n');

            core.setFailed(
              `Copilot 리뷰 미처리 코멘트 ${unresolvedComments.length}건\n\n${summary}\n\n각 코멘트에 답글을 달거나 resolve 후 머지하세요.`
            );
