name: Copilot Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate'
        required: false
        type: string

concurrency:
  group: copilot-gate-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  check-copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write

    steps:
      - name: Check for unresolved Copilot review comments
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request_review_comment мЭіл≤§нКЄмЧРмДЬ Copilot мЩЄ мГИ мљФл©ШнКЄлКФ мК§нВµ
            // Copilot мГИ мљФл©ШнКЄлКФ мК§нВµнХШмІА мХКк≥† мЮђнПЙк∞А вЖТ gateл•Љ failureл°Ь к∞±мЛ†
            if (context.eventName === 'pull_request_review_comment'
                && !context.payload.comment?.in_reply_to_id
                && context.payload.comment?.user?.login !== 'copilot-pull-request-reviewer[bot]') {
              core.notice('Copilot мЩЄ міИкЄ∞ мљФл©ШнКЄ вАФ нПЙк∞А мК§нВµ');
              return;
            }

            // pull_request_review мЭіл≤§нКЄмЧРмДЬ Copilot botмЭі мХДлЛМ к≤љмЪ∞ мК§нВµ
            if (context.eventName === 'pull_request_review' &&
                context.payload.review?.user?.login !== 'copilot-pull-request-reviewer[bot]') {
              core.notice('Copilot мЩЄ л¶ђлЈ∞мЦі вАФ нПЙк∞А мК§нВµ');
              return;
            }

            const prNumber = context.payload.inputs?.pr_number
              ?? context.payload.pull_request?.number
              ?? context.payload.review?.pull_request_url?.match(/\/(\d+)$/)?.[1];

            if (!prNumber) {
              core.warning('PR numberмЭД нЩХмЭЄнХ† мИШ мЧЖмКµлЛИлЛ§.');
              return;
            }

            // PR HEAD SHA м°∞нЪМ
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prNumber),
            });
            const sha = pr.head.sha;

            const setStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state,
                context: 'check-copilot-review',
                description,
              });
            };

            // 1. Copilot л¶ђлЈ∞ мЧђлґА нЩХмЭЄ
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: Number(prNumber) }
            );

            const copilotReviews = reviews.filter(
              r => r.user.login === 'copilot-pull-request-reviewer[bot]'
            );

            if (copilotReviews.length === 0) {
              await setStatus('pending', 'Copilot л¶ђлЈ∞ лМАкЄ∞ м§С');
              return;
            }

            // 2. лѓЄм≤Шл¶ђ мЭЄлЭЉмЭЄ мљФл©ШнКЄ мИШмІС
            const allComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: Number(prNumber) }
            );

            const copilotReviewIds = new Set(copilotReviews.map(r => r.id));

            const copilotTopComments = allComments.filter(c =>
              copilotReviewIds.has(c.pull_request_review_id) && !c.in_reply_to_id
            );

            const repliedIds = new Set(
              allComments
                .filter(c => c.in_reply_to_id)
                .map(c => c.in_reply_to_id)
            );

            const unresolvedComments = copilotTopComments.filter(c => !repliedIds.has(c.id));

            // 3. нМРм†Х
            if (unresolvedComments.length === 0) {
              await setStatus('success', `Copilot л¶ђлЈ∞ ${copilotTopComments.length}к±і вАФ л™®лСР м≤Шл¶ђлР®`);
              return;
            }

            const summary = unresolvedComments
              .map(c => `${c.path}:${c.line ?? c.original_line ?? '?'}`)
              .join(', ');

            await setStatus('failure', `лѓЄм≤Шл¶ђ ${unresolvedComments.length}к±і: ${summary}`.slice(0, 140));
