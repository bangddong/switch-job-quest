name: BE CI

on:
  pull_request:

concurrency:
  group: be-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: BE CI / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('be/**/*.gradle.kts', 'be/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint — unsafe !! operator
        working-directory: ${{ github.workspace }}
        run: |
          result=$(grep -rn '!!' be --include='*.kt' \
            --exclude-dir='test' --exclude-dir='build' 2>/dev/null \
            | grep -v '^Binary') || exit_code=$?
          if [ "${exit_code:-0}" -gt 1 ]; then
            echo "❌ grep command failed unexpectedly (exit code: ${exit_code})"
            exit "${exit_code}"
          fi
          if [ -n "$result" ]; then
            echo "❌ Unsafe !! operator found. Use ?. or ?: instead."
            echo "$result"
            exit 1
          fi
          echo "✅ No unsafe !! operator found."

      - name: Lint — Flyway 마이그레이션 버전 중복 검사
        working-directory: ${{ github.workspace }}
        run: |
          # 마이그레이션이 core-api / db-core 두 모듈에 분산되어 있고 런타임 클래스패스에서
          # 합쳐진다 — 버전 번호(V숫자)가 모듈 경계를 넘어 유일해야 함. (2026-07-01 prod 다운 사고,
          # PR #231에서 V8이 core-api·db-core 양쪽에 중복 생성되어 Flyway 부팅 실패)
          dup=$(find be -path '*/db/migration/V*.sql' | grep -v '/build/' \
            | sed -E 's#.*/(V[0-9]+)__.*#\1#' | sort | uniq -d)
          if [ -n "$dup" ]; then
            echo "❌ Flyway 마이그레이션 버전 번호 중복 발견: $dup"
            echo "core-api와 db-core 양쪽 db/migration 디렉토리를 모두 확인해 유일한 다음 버전을 사용하세요."
            find be -path '*/db/migration/V*.sql' | grep -v '/build/' | sort -V
            exit 1
          fi
          echo "✅ Flyway 마이그레이션 버전 번호 중복 없음."

      # parityTest는 전용 소스셋이라 `check`/`test`에 자동으로 붙지 않는다 → 명시 호출 필수.
      # 빠지면 "in-process vs HTTP 동등성"이라는 Phase 1 완료 판정 근거가 CI에서 죽는다(#308 QA MEDIUM).
      - name: Build & Test
        run: ./gradlew :core:core-api:bootJar test :core:core-api:parityTest --no-daemon

      # 모듈별 경로를 전부 나열한다. core-api만 올리면 ai-api 등 다른 모듈이 실패했을 때
      # 리포트가 남지 않아 CI 로그만으로 디버깅해야 한다(#298 QA MEDIUM).
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            be/core/core-api/build/reports/tests/
            be/core/ai-api/build/reports/tests/
            be/core/core-domain/build/reports/tests/
            be/storage/db-core/build/reports/tests/
            be/clients/client-ai/build/reports/tests/
