name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'check-copilot-review',
              description: 'Claude 리뷰 진행 중',
            });

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "PR_TITLE=${{ github.event.pull_request.title }}" >> $GITHUB_ENV

      - name: Build review prompt
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const diff = fs.readFileSync('/tmp/pr.diff', 'utf8');
          const title = process.env.PR_TITLE || '';

          const prompt = `당신은 Kotlin/Spring Boot + React/TypeScript 풀스택 프로젝트의 코드 리뷰어입니다.

## 리뷰 대상 PR
제목: ${title}

## 변경 diff
\`\`\`diff
${diff}
\`\`\`

## 리뷰 규칙
- BE: core-domain에 Spring 어노테이션 금지, db-core↔client-ai 직접 의존 금지, !! 사용 금지
- FE: default export 금지, CSS모듈/Tailwind/styled-components 금지, Context/Redux/Zustand 금지
- 테스트: Evaluator 테스트에 @Mock/@InjectMocks 금지 → RETURNS_DEEP_STUBS 패턴

## 출력 형식 (반드시 준수)
다음 마크다운 형식으로만 출력하세요:

## 🤖 Claude 코드 리뷰

### CRITICAL (머지 전 필수 수정)
- 없음 (또는 발견된 항목)

### WARNING (권장 수정)
- 없음 (또는 발견된 항목)

### PASSED
- 확인된 긍정적 항목

---
CRITICAL 여부: YES 또는 NO`;

          fs.writeFileSync('/tmp/prompt.txt', prompt);
          SCRIPT

      - name: Run Claude review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESULT=$(claude -p "$(cat /tmp/prompt.txt)" \
            --dangerously-skip-permissions \
            --model claude-haiku-4-5-20251001 2>&1)
          echo "$RESULT" > /tmp/review.txt

          if echo "$RESULT" | grep -q "CRITICAL 여부: YES"; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');

            // 기존 Claude 리뷰 코멘트 찾아서 업데이트 또는 새로 작성
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              }
            );

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('🤖 Claude 코드 리뷰')
            );

            const body = review.split('CRITICAL 여부:')[0].trim();

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Set final status
        uses: actions/github-script@v7
        env:
          HAS_CRITICAL: ${{ steps.review.outputs.has_critical }}
        with:
          script: |
            const hasCritical = process.env.HAS_CRITICAL === 'true';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: hasCritical ? 'failure' : 'success',
              context: 'check-copilot-review',
              description: hasCritical
                ? 'Claude 리뷰: CRITICAL 항목 있음 — 수정 필요'
                : 'Claude 리뷰: 통과',
            });
