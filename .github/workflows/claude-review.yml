name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'check-copilot-review',
              description: 'Claude 리뷰 진행 중',
            });

      - name: Run Claude review and post comment
        id: review
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const https = require('https');
            const { execSync } = require('child_process');

            // PR diff 가져오기
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;

            let diff = '';
            try {
              diff = execSync(`gh pr diff ${prNumber}`, {
                env: { ...process.env, GH_TOKEN: process.env.GITHUB_TOKEN },
                maxBuffer: 1024 * 1024 * 5,
              }).toString();
            } catch (e) {
              diff = '(diff 조회 실패)';
            }

            // 프롬프트 구성
            const prompt = [
              '당신은 Kotlin/Spring Boot + React/TypeScript 풀스택 프로젝트의 코드 리뷰어입니다.',
              '',
              '## 리뷰 대상 PR',
              `제목: ${prTitle}`,
              '',
              '## 변경 diff',
              '```diff',
              diff.slice(0, 15000),
              '```',
              '',
              '## 리뷰 규칙',
              '- BE: core-domain에 Spring 어노테이션 금지, db-core↔client-ai 직접 의존 금지, !! 사용 금지',
              '- FE: default export 금지, CSS모듈/Tailwind/styled-components 금지, Context/Redux/Zustand 금지',
              '- 테스트: Evaluator 테스트에 @Mock/@InjectMocks 금지 → RETURNS_DEEP_STUBS 패턴',
              '',
              '## 출력 형식 (반드시 준수)',
              '다음 마크다운 형식으로만 출력하세요:',
              '',
              '## 🤖 Claude 코드 리뷰',
              '',
              '### CRITICAL (머지 전 필수 수정)',
              '- 없음 (또는 발견된 항목)',
              '',
              '### WARNING (권장 수정)',
              '- 없음 (또는 발견된 항목)',
              '',
              '### PASSED',
              '- 확인된 긍정적 항목',
              '',
              '---',
              'CRITICAL 여부: YES 또는 NO',
            ].join('\n');

            // Anthropic API 호출
            const result = await new Promise((resolve, reject) => {
              const body = JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }],
              });

              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                },
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    resolve(json.content?.[0]?.text || '(응답 없음)');
                  } catch (e) { reject(e); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });

            // CRITICAL 여부
            const hasCritical = result.includes('CRITICAL 여부: YES');
            core.setOutput('has_critical', String(hasCritical));

            // PR 코멘트 (기존 코멘트 업데이트 or 새로 작성)
            const body = result.split('CRITICAL 여부:')[0].trim();
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('🤖 Claude 코드 리뷰')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Set final status
        uses: actions/github-script@v7
        env:
          HAS_CRITICAL: ${{ steps.review.outputs.has_critical }}
        with:
          script: |
            const hasCritical = process.env.HAS_CRITICAL === 'true';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: hasCritical ? 'failure' : 'success',
              context: 'check-copilot-review',
              description: hasCritical
                ? 'Claude 리뷰: CRITICAL 항목 있음 — 수정 필요'
                : 'Claude 리뷰: 통과',
            });
