name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── pull_request 트리거: Claude API 호출 후 PR review 생성 ──
      - name: Set pending status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'check-copilot-review',
              description: 'Claude 리뷰 진행 중',
            });

      - name: Run Claude review and post PR review
        if: github.event_name == 'pull_request'
        id: review
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const https = require('https');
            const { execSync } = require('child_process');

            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const sha = context.payload.pull_request.head.sha;

            // PR diff 가져오기
            let diff = '';
            try {
              diff = execSync(`gh pr diff ${prNumber}`, {
                env: { ...process.env, GH_TOKEN: process.env.GH_TOKEN },
                maxBuffer: 1024 * 1024 * 5,
              }).toString();
            } catch (e) {
              console.error('diff 조회 실패:', e.message);
              diff = '(diff 조회 실패)';
            }

            // 프롬프트 구성
            const prompt = [
              '당신은 Kotlin/Spring Boot + React/TypeScript 풀스택 프로젝트의 코드 리뷰어입니다.',
              '',
              '## 리뷰 대상 PR',
              `제목: ${prTitle}`,
              '',
              '## 변경 diff',
              '```diff',
              diff.slice(0, 15000),
              '```',
              '',
              '## 리뷰 규칙',
              '- BE: core-domain에 Spring 어노테이션 금지, db-core↔client-ai 직접 의존 금지, !! 사용 금지',
              '- FE: default export 금지, CSS모듈/Tailwind/styled-components 금지, Context/Redux/Zustand 금지',
              '- 테스트: Evaluator 테스트에 @Mock/@InjectMocks 금지 → RETURNS_DEEP_STUBS 패턴',
              '- CI/CD(.github/workflows): 보안 취약점(시크릿 노출, 권한 과다)만 CRITICAL. 모델명·설정값·버전 변경은 CRITICAL 금지.',
              '',
              '## 출력 형식 (반드시 준수)',
              '다음 마크다운 형식으로만 출력하세요:',
              '',
              '## 🤖 Claude 코드 리뷰',
              '',
              '### CRITICAL (머지 전 필수 수정)',
              '- 없음 (또는 발견된 항목)',
              '',
              '### WARNING (권장 수정)',
              '- 없음 (또는 발견된 항목)',
              '',
              '### PASSED',
              '- 확인된 긍정적 항목',
              '',
              '---',
              'CRITICAL 여부: YES 또는 NO',
            ].join('\n');

            // Anthropic API 호출
            const result = await new Promise((resolve, reject) => {
              const body = JSON.stringify({
                model: 'claude-haiku-4-5',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }],
              });

              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                },
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    if (!json.content?.[0]?.text) {
                      console.error('API 에러 응답:', JSON.stringify(json));
                    }
                    resolve(json.content?.[0]?.text || `(응답 없음: ${json.error?.message || JSON.stringify(json)})`);
                  } catch (e) { reject(e); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });

            const hasCritical = result.includes('CRITICAL 여부: YES');
            core.setOutput('has_critical', String(hasCritical));
            core.setOutput('sha', sha);

            const reviewBody = result.split('CRITICAL 여부:')[0].trim();

            // 기존 봇 REQUEST_CHANGES 리뷰 dismiss
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            for (const r of reviews.data) {
              if (r.user.login === 'github-actions[bot]' && r.state === 'CHANGES_REQUESTED') {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  review_id: r.id,
                  message: '새 커밋으로 재검토합니다.',
                });
              }
            }

            // PR review 생성 (REQUEST_CHANGES or APPROVE)
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              commit_id: sha,
              body: reviewBody,
              event: hasCritical ? 'REQUEST_CHANGES' : 'APPROVE',
            });

      - name: Set final status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HAS_CRITICAL: ${{ steps.review.outputs.has_critical }}
        with:
          script: |
            const hasCritical = process.env.HAS_CRITICAL === 'true';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: hasCritical ? 'failure' : 'success',
              context: 'check-copilot-review',
              description: hasCritical
                ? 'Claude 리뷰: CRITICAL 항목 있음 — 댓글로 resolve 후 머지'
                : 'Claude 리뷰: 통과',
            });

      # ── pull_request_review_comment 트리거: 답글 감지 후 status 갱신 ──
      - name: Check if all bot review comments are resolved
        if: github.event_name == 'pull_request_review_comment'
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          script: |
            const comment = context.payload.comment;

            // 봇 자신의 답글은 무시
            if (comment.user.login === 'github-actions[bot]') return;

            // 답글이 아니면 무시 (최상위 리뷰 댓글 작성 시)
            if (!comment.in_reply_to_id) return;

            const prNumber = context.payload.pull_request?.number;
            const sha = context.payload.pull_request?.head?.sha;
            if (!prNumber || !sha) return;

            // 이 PR의 모든 리뷰 댓글 조회
            const allComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // 봇의 최상위 리뷰 댓글 (in_reply_to_id 없는 것)
            const botTopComments = allComments.filter(c =>
              c.user.login === 'github-actions[bot]' && !c.in_reply_to_id
            );

            if (botTopComments.length === 0) return;

            // 각 봇 댓글에 non-bot 답글이 달렸는지 확인
            const allResolved = botTopComments.every(botComment =>
              allComments.some(c =>
                c.in_reply_to_id === botComment.id &&
                c.user.login !== 'github-actions[bot]'
              )
            );

            if (allResolved) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'success',
                context: 'check-copilot-review',
                description: 'Claude 리뷰: 모든 지적사항 resolve 완료',
              });
            }
