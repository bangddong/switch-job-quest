name: Copilot Re-review on New Commits

on:
  pull_request:
    types: [synchronize]

jobs:
  request-re-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check if Copilot has already reviewed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const hasReviewed = reviews.data.some(
              (r) => r.user.login === 'copilot-pull-request-reviewer[bot]'
            );

            core.setOutput('has_reviewed', String(hasReviewed));

      - name: Request Copilot re-review
        if: steps.check.outputs.has_reviewed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@github-copilot review',
            });
