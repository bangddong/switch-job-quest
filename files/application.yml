spring:
  application:
    name: devquest

  # Virtual Threads (Java 21 + Spring Boot 4.x)
  threads:
    virtual:
      enabled: true

  # DB - H2 (개발), PostgreSQL (운영)
  datasource:
    url: jdbc:h2:mem:devquest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Spring AI - Anthropic
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:your-api-key-here}
      chat:
        options:
          model: claude-sonnet-4-5
          max-tokens: 2000
          temperature: 0.3  # 평가 일관성을 위해 낮게 설정

# CORS - React dev server
server:
  port: 8080
  cors:
    allowed-origins: "http://localhost:5173"

# Logging
logging:
  level:
    com.devquest: DEBUG
    org.springframework.ai: DEBUG

# DevQuest 설정
devquest:
  ai:
    pass-score: 70          # AI 검사 통과 점수
    max-retry: 3            # 최대 재시도 횟수
    interview-questions: 10 # 모의 면접 문제 수
