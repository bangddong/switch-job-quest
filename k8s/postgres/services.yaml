# Headless Service — StatefulSet Pod별 고정 DNS 부여
# DNS 패턴: postgres-0.postgres-svc.default.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc        # StatefulSet.spec.serviceName과 반드시 일치
  namespace: default
spec:
  clusterIP: None            # headless: 로드밸런싱 없이 각 Pod DNS 직접 노출
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ClusterIP Service — 앱에서 단순 접근용 (postgres:5432)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: default
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
