spring:
  application:
    name: devquest

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import:
      - classpath:db-core.yml
      - classpath:client-ai-anthropic.yml
      - classpath:logging.yml
      - classpath:monitoring.yml

  h2:
    console:
      enabled: false

  threads:
    virtual:
      enabled: true

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

server:
  port: 8080

logging:
  level:
    com.devquest: DEBUG

devquest:
  ai:
    pass-score: 70
    # Phase 1 Task 1.2 조사: AiCallExecutor(client-ai/support)가 소비. core-api 자신은 이 키를
    # 직접 참조하지 않지만, inprocess 모드에서는 client-ai 빈이 core-api 컨텍스트 안에서 뜨므로
    # 여전히 필요하다(롤백 불변식). ai-api에도 동일 값을 이관 완료(Task 1.2). client-ai 컴파일
    # 의존이 제거되는 Phase 3에 이 키를 core-api에서 삭제한다 — 지금 지우면 inprocess 롤백이 깨진다.
    max-retry: 3
    interview-questions: 10
    # AI 포트 전송 계층 전환 스위치. inprocess(기본) = client-ai 빈 사용(무행동). http = HTTP 어댑터 빈 사용.
    # 이 키는 core-api 자신(AiTransportConfig)이 @ConditionalOnProperty로 직접 소비 — ai-api로 이관 대상 아님.
    # ⚠️ Phase 1 Task 1.4a: 이 기본값을 바꾸지 않는다. http는 테스트에서만 켠다(무행동 불변식).
    transport: inprocess
    http:
      # ai-api 베이스 URL. 시크릿 아님 — 평문 기본값 허용(로컬 개발 기준 ai-api 포트 8081).
      base-url: ${AI_API_BASE_URL:http://localhost:8081}
      # AiHttpClientConfig 참고: 내부망 연결이라 3초 안에 안 붙으면 네트워크/기동 문제로 간주해 즉시 실패.
      connect-timeout-ms: ${AI_API_CONNECT_TIMEOUT_MS:3000}
      # AiHttpClientConfig 참고(Task 1.4b 정정): ai-api 내부 AiCallExecutor가 max-retry=3으로 같은
      # HTTP 응답 안에서 순차 재시도(단일 호출 상한 가정 30초 × 3회 = 90초)하는데, 기존 기본값 90000이
      # 이 90초와 정확히 일치해 안전 마진이 0이었다(1ms만 늘어져도 core가 먼저 끊고 ai-api는 LLM 비용을
      # 계속 태움). 90초 위에 60초 안전 마진을 더해 150초로 상향.
      read-timeout-ms: ${AI_API_READ_TIMEOUT_MS:150000}
  judge0:
    # Phase 1 Task 1.2 조사: Judge0Adapter(client-ai/judge0)가 소비. max-retry와 동일한 이유로
    # core-api에 유지하되 ai-api에도 이관 완료(Task 1.2). Phase 3(client-ai 의존 제거)에 삭제 대상.
    api-key: ${JUDGE0_API_KEY:}
    api-host: judge0-ce.p.rapidapi.com
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    github-client-id: ${GITHUB_CLIENT_ID}
    github-client-secret: ${GITHUB_CLIENT_SECRET}
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:2592000000}
  mail:
    from: noreply@dhbang.co.kr
    enabled: ${MAIL_ENABLED:false}
  daily-question:
    tech-stack: "Java,Spring Boot,JPA,데이터베이스(SQL/인덱스/트랜잭션),네트워크(HTTP/TCP/DNS),운영체제(프로세스/스레드/메모리),자료구조/알고리즘,시스템 설계,Redis/캐시,Docker/쿠버네티스,CI-CD/Git"

  rate-limit:
    tech-interview:
      capacity: 2
      refill-days: 1
    daily-explain:
      capacity: 5
      refill-days: 1
