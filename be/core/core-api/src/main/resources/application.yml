spring:
  application:
    name: devquest

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import:
      - classpath:db-core.yml
      - classpath:client-ai-anthropic.yml
      - classpath:logging.yml
      - classpath:monitoring.yml

  h2:
    console:
      enabled: false

  threads:
    virtual:
      enabled: true

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

server:
  port: 8080

logging:
  level:
    com.devquest: DEBUG

devquest:
  ai:
    pass-score: 70
    max-retry: 3
    interview-questions: 10
  judge0:
    api-key: ${JUDGE0_API_KEY:}
    api-host: judge0-ce.p.rapidapi.com
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    github-client-id: ${GITHUB_CLIENT_ID}
    github-client-secret: ${GITHUB_CLIENT_SECRET}
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:2592000000}
  mail:
    from: noreply@dhbang.co.kr
    enabled: ${MAIL_ENABLED:false}

  rate-limit:
    tech-interview:
      capacity: 2
      refill-days: 1
