spring:
  application:
    name: devquest

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import:
      - classpath:db-core.yml
      - classpath:client-ai-anthropic.yml
      - classpath:logging.yml
      - classpath:monitoring.yml

  h2:
    console:
      enabled: false

  threads:
    virtual:
      enabled: true

server:
  port: 8080

logging:
  level:
    com.devquest: DEBUG

devquest:
  ai:
    pass-score: 70
    max-retry: 3
    interview-questions: 10
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    github-client-id: ${GITHUB_CLIENT_ID:Iv23li4rMCxm07zyBBmN}
    github-client-secret: ${GITHUB_CLIENT_SECRET:009ac270672a56cf326d45eb681e5e23e180c127}
    jwt-secret: ${JWT_SECRET:devquest-local-jwt-secret-must-be-at-least-256-bits-long-for-hmac}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:2592000000}
