spring:
  application:
    name: devquest

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import:
      - classpath:db-core.yml
      - classpath:client-ai-anthropic.yml
      - classpath:logging.yml
      - classpath:monitoring.yml

  h2:
    console:
      enabled: false

  threads:
    virtual:
      enabled: true

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

server:
  port: 8080

logging:
  level:
    com.devquest: DEBUG

devquest:
  ai:
    pass-score: 70
    max-retry: 3
    interview-questions: 10
    # AI 포트 전송 계층 전환 스위치. inprocess(기본) = client-ai 빈 사용(무행동). http = HTTP 어댑터 빈 사용(Phase 1 배선 전까지 미실행).
    transport: inprocess
  judge0:
    api-key: ${JUDGE0_API_KEY:}
    api-host: judge0-ce.p.rapidapi.com
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    github-client-id: ${GITHUB_CLIENT_ID}
    github-client-secret: ${GITHUB_CLIENT_SECRET}
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:2592000000}
  mail:
    from: noreply@dhbang.co.kr
    enabled: ${MAIL_ENABLED:false}
  daily-question:
    tech-stack: "Java,Spring Boot,JPA,데이터베이스(SQL/인덱스/트랜잭션),네트워크(HTTP/TCP/DNS),운영체제(프로세스/스레드/메모리),자료구조/알고리즘,시스템 설계,Redis/캐시,Docker/쿠버네티스,CI-CD/Git"

  rate-limit:
    tech-interview:
      capacity: 2
      refill-days: 1
    daily-explain:
      capacity: 5
      refill-days: 1
