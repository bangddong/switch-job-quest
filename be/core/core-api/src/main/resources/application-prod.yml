logging:
  level:
    com.devquest: INFO
    org.flywaydb: INFO

spring:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  error:
    include-stacktrace: never
    include-message: never

grafana:
  otlp:
    enabled: true
    instance-id: "1680166"

# micrometer-registry-otlp가 classpath에 있으면 Spring Boot autoconfiguration이
# OtlpMeterRegistry를 자동 생성 → OtlpMetricsConfig 수동 bean과 중복 생성됨.
# 수동 bean(OtlpMetricsConfig)만 사용하도록 autoconfiguration 비활성화.
management:
  otlp:
    metrics:
      export:
        enabled: false

storage:
  datasource:
    core:
      driver-class-name: org.postgresql.Driver
      jdbc-url: jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      maximum-pool-size: 10
      minimum-idle: 0
      connection-test-query: SELECT 1
