logging:
  level:
    com.devquest: INFO
    org.flywaydb: INFO

spring:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  error:
    include-stacktrace: never
    include-message: never
  tomcat:
    threads:
      max: 25   # fly.toml hard_limit=25 커넥션과 정합
      min-spare: 5

grafana:
  otlp:
    enabled: true
    instance-id: "1680166"

management:
  otlp:
    metrics:
      export:
        # Spring Boot auto-config OtlpMeterRegistry 비활성화.
        # 수동 Bean(OtlpMetricsConfig)만 사용. 두 개 동시 기동 시 429 rate limit 발생.
        enabled: false


storage:
  datasource:
    core:
      driver-class-name: org.postgresql.Driver
      jdbc-url: jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      maximum-pool-size: 10
      minimum-idle: 0
      connection-test-query: SELECT 1
