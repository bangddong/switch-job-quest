logging:
  level:
    com.devquest: INFO
    org.flywaydb: INFO

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.micrometer.metrics.autoconfigure.export.otlp.OtlpMetricsExportAutoConfiguration
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  error:
    include-stacktrace: never
    include-message: never

grafana:
  otlp:
    enabled: true
    instance-id: "1680166"

# micrometer-registry-otlpк°Җ classpathм—җ мһҲмңјл©ҙ Spring Boot autoconfigurationмқҙ
# OtlpMeterRegistryлҘј мһҗлҸҷ мғқм„ұ вҶ’ OtlpMetricsConfig мҲҳлҸҷ beanкіј мӨ‘ліө мғқм„ұлҗЁ.
# Spring Boot 4.xм—җм„ң нҒҙлһҳмҠӨк°Җ spring-boot-micrometer-metrics лӘЁл“ҲлЎң мқҙлҸҷлҗЁ.
# management.otlp.metrics.export.enabled=falseлҠ” мқҙ нҒҙлһҳмҠӨм—җ м Ғмҡ© м•Ҳ лҗЁ вҶ’ excludeлЎң м§Ғм ‘ м ңкұ°.
# (spring.autoconfigure.excludeлҠ” spring: лё”лЎқм—җ лі‘н•©лҗЁ)

storage:
  datasource:
    core:
      driver-class-name: org.postgresql.Driver
      jdbc-url: jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      maximum-pool-size: 10
      minimum-idle: 0
      connection-test-query: SELECT 1
