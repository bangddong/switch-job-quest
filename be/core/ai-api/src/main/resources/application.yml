spring:
  application:
    name: devquest-ai-api
  # Phase 1 Task 1.1 — client-ai가 요구하는 ChatModel 빈(Spring AI Anthropic 오토컨피그)을
  # 로드하기 위한 하드 전제. 이게 없으면 컨텍스트 로드 자체가 실패한다.
  # boss-model·boss-max-tokens(AiClientConfig)도 이 파일에서 함께 온다 — client-ai 모듈
  # 리소스를 core-api·ai-api가 동일하게 import하므로 값이 자동으로 동행(별도 이관 불필요).
  config:
    import: classpath:client-ai-anthropic.yml
  web:
    error:
      # Phase 1 Task 1.5 정정(parity 테스트로 실측 발견) — Task 1.4a는 이 키를 `server.error.
      # include-message`로 뒀지만 그건 Boot 3 이하 키다. Boot 4.0.3은 에러 속성 바인딩을
      # `ServerProperties`(→ server.*)에서 `WebProperties`(→ spring.web.*)로 옮겼다
      # (`org.springframework.boot.autoconfigure.web.WebProperties`가 `@ConfigurationProperties
      # ("spring.web")`로 `error: ErrorProperties`를 갖는다 — 실측: javap로 바이트코드 직접 확인).
      # `server.error.include-message`는 존재하지 않는 키라 조용히 무시돼 기본값(`never`)으로 동작했고,
      # 지금까지 core로 실제 원인 메시지가 전달된 적이 없었다(실측: 이 정정 전 raw HTTP 응답에
      # message 필드 자체가 없음을 AiApiHttpParityTest로 확인). ai-api는 /internal/** 내부 전용
      # (공개 API가 아님)이고 Phase 3에서 EKS NetworkPolicy로 외부 접근을 차단할 계획이므로, 내부
      # 예외 메시지 노출은 허용 가능한 트레이드오프로 판단해 always로 켠다(보안 판단, Task 1.4a 결정
      # 유지, 키만 정정). 스택트레이스는 그대로 노출하지 않는다(include-stacktrace 기본값 never 유지).
      include-message: always

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.devquest: DEBUG

# Phase 1 Task 1.2 — client-ai가 소비하는데 core-api/application.yml에만 명시돼 있던 설정을
# 이관한다. 값은 core-api와 동일하게 맞춰 동작 동일성을 유지한다(우연한 기본값 일치에 기대지 않음).
devquest:
  ai:
    # AiCallExecutor(client-ai/support) 소비. core-api/application.yml의 devquest.ai.max-retry와 동일.
    max-retry: 3
  judge0:
    # Judge0Adapter(client-ai/judge0) 소비. core-api/application.yml의 devquest.judge0.*와 동일.
    # 시크릿은 반드시 ${ENV:} 플레이스홀더 — application-local.yml을 만들지 않는다(be/CLAUDE.md 규칙).
    api-key: ${JUDGE0_API_KEY:}
    api-host: judge0-ce.p.rapidapi.com
