app = 'devquest-api'
primary_region = 'nrt'

[build]

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  CORS_ALLOWED_ORIGINS = "https://quest.dhbang.co.kr"

# 민감 정보는 fly secrets set 으로 주입:
#   fly secrets set ANTHROPIC_API_KEY=sk-...

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "60s"
  interval = "15s"
  method = "get"
  path = "/health"
  timeout = "10s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
