app = 'devquest-api'
primary_region = 'nrt'

# OOM 완화: RSS가 512MB 한계 근접 시 스왑으로 흡수 (2026-07-07, OOM 조사 결과)
# 근본 원인: 부팅 직후 가용 마진 ~44MB + 시간당 ~3MB RSS 증가 → 장시간 가동 시 OOM kill
swap_size_mb = 256


[build]

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  CORS_ALLOWED_ORIGINS = "https://quest.dhbang.co.kr"
  TZ = "Asia/Seoul"

# 민감 정보는 fly secrets set 으로 주입:
#   fly secrets set ANTHROPIC_API_KEY=sk-...

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "180s"
  interval = "15s"
  method = "get"
  path = "/health"
  timeout = "10s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
