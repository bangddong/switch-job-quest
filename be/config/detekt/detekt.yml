build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

# 대부분의 규칙셋 비활성화 — 아래 명시된 것만 활성화
comments:
  active: false

complexity:
  active: false

coroutines:
  active: false

empty-blocks:
  active: false

exceptions:
  active: false

formatting:
  active: false

libraries:
  active: false

naming:
  active: false

performance:
  active: false

# [1. 코드 어시스턴트] potential-bugs: !! 사용 금지
potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
    excludes: ['**/test/**', '**/Test*.kt', '**/*Test.kt']

# [1. 코드 어시스턴트] style: val 선호, 확장함수 매핑 관련
style:
  active: true
  VarCouldBeVal:
    active: true
    excludes: ['**/test/**', '**/Test*.kt', '**/*Test.kt']
  UnusedImports:
    active: true
  # 나머지 style 규칙 비활성화
  ClassOrdering: { active: false }
  CollapsibleIfStatements: { active: false }
  DataClassContainsFunctions: { active: false }
  DataClassShouldBeImmutable: { active: false }
  DestructuringDeclarationWithTooManyEntries: { active: false }
  EqualsNullCall: { active: false }
  EqualsOnSignatureLine: { active: false }
  ExplicitCollectionElementAccessMethod: { active: false }
  ExplicitItLambdaParameter: { active: false }
  ExpressionBodySyntax: { active: false }
  ForbiddenComment: { active: false }
  ForbiddenImport: { active: false }
  ForbiddenMethodCall: { active: false }
  ForbiddenSuppress: { active: false }
  ForbiddenVoid: { active: false }
  FunctionOnlyReturningConstant: { active: false }
  LoopWithTooManyJumpStatements: { active: false }
  MagicNumber: { active: false }
  MandatoryBracesIfStatements: { active: false }
  MandatoryBracesLoops: { active: false }
  MaxChainedCallsOnSameLine: { active: false }
  MaxLineLength: { active: false }
  MayBeConst: { active: false }
  ModifierOrder: { active: false }
  MultilineLambdaItParameter: { active: false }
  MultilineRawStringIndentation: { active: false }
  NestedClassesVisibility: { active: false }
  NewLineAtEndOfFile: { active: false }
  NoTabs: { active: false }
  NullableBooleanCheck: { active: false }
  ObjectLiteralToLambda: { active: false }
  OptionalAbstractKeyword: { active: false }
  OptionalUnit: { active: false }
  PreferToOverPairSyntax: { active: false }
  ProtectedMemberInFinalClass: { active: false }
  RedundantExplicitType: { active: false }
  RedundantHigherOrderMapUsage: { active: false }
  RedundantVisibilityModifierRule: { active: false }
  ReturnCount: { active: false }
  SafeCast: { active: false }
  SerialVersionUIDInSerializableClass: { active: false }
  SpacingBetweenPackageAndImports: { active: false }
  StringShouldBeRawString: { active: false }
  ThrowsCount: { active: false }
  TrailingWhitespace: { active: false }
  TrimMultilineRawString: { active: false }
  UnderscoresInNumericLiterals: { active: false }
  UnnecessaryAbstractClass: { active: false }
  UnnecessaryAnnotationUseSiteTarget: { active: false }
  UnnecessaryApply: { active: false }
  UnnecessaryBackticks: { active: false }
  UnnecessaryBracesAroundTrailingLambda: { active: false }
  UnnecessaryFilter: { active: false }
  UnnecessaryInheritance: { active: false }
  UnnecessaryInnerClass: { active: false }
  UnnecessaryLet: { active: false }
  UnnecessaryParentheses: { active: false }
  UntilInsteadOfRangeTo: { active: false }
  UnusedPrivateMember: { active: false }
  UnusedPrivateProperty: { active: false }
  UseAnyOrNoneInsteadOfFind: { active: false }
  UseArrayLiteralsInAnnotations: { active: false }
  UseCheckNotNull: { active: false }
  UseCheckOrError: { active: false }
  UseDataClass: { active: false }
  UseEmptyCounterpart: { active: false }
  UseIfEmptyOrIfBlank: { active: false }
  UseIfInsteadOfWhen: { active: false }
  UseIsNullOrEmpty: { active: false }
  UseLet: { active: false }
  UseOrEmpty: { active: false }
  UseRequire: { active: false }
  UseRequireNotNull: { active: false }
  UseSumOfInsteadOfFlatMapSize: { active: false }
  UseWithIndex: { active: false }
  WildcardImport: { active: false }
